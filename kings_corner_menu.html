<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>King's Corner 逢國食品 菜單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-dark:#8A6E2A;--gold-light:#FDF6E3;
  --dark:#12100E;--dark2:#1E1B17;--dark3:#2A2620;
  --border:#E8E0D4;--bg:#F7F3EE;--white:#fff;
  --text:#1A1208;--muted:#7A6E64;--faint:#B0A898;
  --red:#C8272D;--green:#2E6644;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.header-inner{max-width:960px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gold)}
.logo small{font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:1px;color:#9A9088;font-weight:400;margin-left:6px}
.header-right{display:flex;align-items:center;gap:10px}
.search-box{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:6px 14px 6px 32px;font-size:13px;color:#fff;font-family:'Noto Sans TC',sans-serif;outline:none;width:180px;transition:all 0.2s;position:relative}
.search-box::placeholder{color:#9A9088}
.search-box:focus{background:rgba(255,255,255,0.12);border-color:var(--gold);width:220px}
.search-wrap{position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}

/* CATEGORY TABS */
.cat-bar{background:var(--dark2);border-bottom:1px solid #2a2620;position:sticky;top:52px;z-index:90}
.cat-tabs{max-width:960px;margin:0 auto;display:flex;overflow-x:auto;padding:0 12px;scrollbar-width:none;gap:0}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:12px 16px;font-size:12px;font-weight:700;color:#9A9088;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s;white-space:nowrap;font-family:'Noto Sans TC',sans-serif}
.cat-tab:hover{color:#F0EBE0}
.cat-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.cat-count{font-size:10px;background:rgba(255,255,255,0.1);border-radius:10px;padding:1px 6px;margin-left:4px}
.cat-tab.active .cat-count{background:rgba(201,168,76,0.2);color:var(--gold)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:20px 16px 60px}

/* SECTION */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--dark)}
.section-hd h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--dark)}
.section-count{font-size:11px;color:var(--muted);background:var(--dark3)3a;padding:3px 10px;border-radius:20px;border:1px solid var(--border)}

/* PRODUCT GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:32px}
.prod-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:box-shadow 0.15s,transform 0.15s}
.prod-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.1);transform:translateY(-2px)}
.prod-card-top{padding:14px 16px 10px;border-bottom:1px solid #f0ece8}
.prod-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:4px}
.prod-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.prod-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.tag-origin{background:#f0f7ff;color:#1a5fa8;border:1px solid #c8dcf5}
.tag-spec{background:#f7f3ee;color:var(--muted);border:1px solid var(--border)}
.tag-note{background:#fff8e6;color:var(--gold-dark);border:1px solid #ffe0a0}

/* Price block */
.prod-prices{display:flex;align-items:flex-end;gap:12px;padding:10px 16px}
.price-item{display:flex;flex-direction:column;align-items:center}
.price-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-bottom:2px}
.price-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.price-sale{color:var(--red)}
.price-retail{color:var(--muted);font-size:16px;text-decoration:line-through}
.price-cost{color:var(--faint);font-size:14px}
.price-divider{width:1px;background:var(--border);height:32px;align-self:center}
.saving-badge{margin-left:auto;background:var(--red);color:white;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}

/* SEARCH RESULTS */
.search-results-banner{background:var(--gold-light);border:1px solid #e8d090;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--gold-dark);display:none}
.search-results-banner.show{display:block}

/* EMPTY */
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-state .ei{font-size:48px;margin-bottom:12px}

/* FLOAT STATS */
.float-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--dark);color:#F0EBE0;border-radius:30px;padding:10px 20px;font-size:12px;display:flex;gap:16px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:200;border:1px solid var(--border)}
.fb-item{display:flex;flex-direction:column;align-items:center}
.fb-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1}
.fb-label{font-size:9px;color:#9A9088;text-transform:uppercase;letter-spacing:1px}
.fb-div{width:1px;height:28px;background:#3a3630}

@media(max-width:600px){
  .prod-grid{grid-template-columns:1fr}
  .search-box{width:140px}.search-box:focus{width:160px}
  .float-bar{bottom:8px;padding:8px 14px;gap:10px}
}
</style>
</head>

<div class="header">

    <div class="header-right">

const SHEET_EMOJI = {
  'RICHY':'🍘', '韓國CJ':'🇰🇷', '王麵河粉':'🍜', '海士':'🦀',
  '中國冬粉':'🍲', '調味品':'🧂', '餅乾':'🍪', '特規專區':'⭐',
  '糖果':'🍬', '傳統零食':'🥜', '飲品':'🧃', '海底撈':'🍲',
  '衛龍魔芋爽':'🌶️'
};

let currentCat = '__all__';
let searchQuery = '';

function init() {
  buildCatTabs();
  renderContent();
}

function buildCatTabs() {
  const tabs = document.getElementById('cat-tabs');
  const total = Object.values(FENGUO_PRODUCTS).reduce((s,a)=>s+a.length,0);
  tabs.innerHTML = `<div class="cat-tab active" onclick="selectCat('__all__',this)">全部 <span class="cat-count">${total}</span></div>` +
    Object.entries(FENGUO_PRODUCTS).map(([cat, prods]) =>
      `<div class="cat-tab" onclick="selectCat('${cat}',this)">${SHEET_EMOJI[cat]||''} ${cat} <span class="cat-count">${prods.length}</span></div>`
    ).join('');
}

function selectCat(cat, el) {
  currentCat = cat;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function doSearch() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  currentCat = '__all__';
  document.querySelectorAll('.cat-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  renderContent();
}

function renderContent() {
  const content = document.getElementById('content');
  const banner = document.getElementById('search-banner');
  let html = '';
  let totalShowing = 0;

  const cats = currentCat === '__all__' ? Object.keys(FENGUO_PRODUCTS) : [currentCat];

  for (const cat of cats) {
    let prods = FENGUO_PRODUCTS[cat] || [];
    if (searchQuery) {
      prods = prods.filter(p => p.name.toLowerCase().includes(searchQuery) || p.spec.toLowerCase().includes(searchQuery) || p.origin.includes(searchQuery));
    }
    if (!prods.length) continue;
    totalShowing += prods.length;

    html += `
      <div class="section-hd">
        <h2>${SHEET_EMOJI[cat]||''} ${cat}</h2>
        <span class="section-count">${prods.length} 項</span>
      </div>
      <div class="prod-grid">
        ${prods.map(p => prodCardHtml(p)).join('')}
      </div>`;
  }

  if (!html) {
    html = `<div class="empty-state"><div class="ei">🔍</div><div>沒有找到「${searchQuery}」的商品</div></div>`;
    banner.className = 'search-results-banner';
  } else if (searchQuery) {
    banner.innerHTML = `搜尋「<strong>${searchQuery}</strong>」：找到 ${totalShowing} 項商品`;
    banner.className = 'search-results-banner show';
  } else {
    banner.className = 'search-results-banner';
  }

  content.innerHTML = html;
  document.getElementById('fb-showing').textContent = totalShowing;
}

function prodCardHtml(p) {
  const saving = p.retail && p.sale && p.retail > p.sale ? Math.round((1 - p.sale/p.retail)*100) : 0;
  const saleDisplay = p.note === '買一送一' ? `${p.sale}<small style="font-size:11px;font-family:'Noto Sans TC',sans-serif;margin-left:3px">買一送一</small>` : p.sale;
  return `<div class="prod-card">
    <div class="prod-card-top">
      <div class="prod-name">${p.name}</div>
      <div class="prod-tags">
        <span class="prod-tag tag-origin">🌍 ${p.origin}</span>
        <span class="prod-tag tag-spec">📦 ${p.spec}</span>
        ${p.note ? `<span class="prod-tag tag-note">🎁 ${p.note}</span>` : ''}
      </div>
    </div>
    <div class="prod-prices">
      <div class="price-item">
        <div class="price-label">團購價</div>
        <div class="price-val price-sale">$${saleDisplay}</div>
      </div>
      ${p.retail && p.retail !== p.sale ? `
      <div class="price-divider"></div>
      <div class="price-item">
        <div class="price-label">末售</div>
        <div class="price-val price-retail">$${p.retail}</div>
      </div>` : ''}
      ${saving >= 5 ? `<div class="saving-badge">省 ${saving}%</div>` : ''}
    </div>
  </div>`;
}

init();
